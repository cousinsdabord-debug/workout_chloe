<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chloé">
<title>Chloé Training</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;
  --surface:#f4f6fb;
  --surface2:#eaeefc;
  --border:#dde3f5;
  --text:#0d1226;
  --muted:#8892b0;
  --muted2:#c8d0e8;
  --blue:#1a4fd6;
  --blue2:#2563eb;
  --blue3:#3b82f6;
  --s1:#1a4fd6;
  --s2:#0e7490;
  --s3:#7c3aed;
  --s4:#db2777;
  --s5:#64748b;
  --accent:#1a4fd6;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;overflow-x:hidden}

/* HEADER */
.header{padding:20px 20px 0;display:flex;align-items:flex-end;justify-content:space-between}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;line-height:1;color:var(--text)}
.header-title span{color:var(--accent)}
.header-date{font-size:12px;color:var(--muted);text-align:right;line-height:1.5}

/* CHRONO BAR */
.chrono-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;margin:12px 20px 0;background:var(--surface);border:1px solid var(--border);border-radius:14px}
.chrono-display{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--text);line-height:1;min-width:90px}
.chrono-display.running{color:var(--blue)}
.chrono-controls{display:flex;gap:8px}
.chrono-btn{padding:8px 16px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:0.03em}
.chrono-start{background:var(--blue);color:#fff}
.chrono-start.running{background:#dc2626}
.chrono-reset{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.chrono-reset:active{opacity:.7}

/* WEEK STRIP */
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:16px 20px 0}
.wday{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.wday-lbl{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.wday-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted);background:var(--surface);border:1.5px solid transparent;transition:all .2s}
.wday-dot.today{border-color:var(--accent);color:var(--accent)}
.wday-dot.has-session{background:var(--surface2);color:var(--text)}
.wday-dot.s1-day{border-color:var(--s1) !important}
.wday-dot.s2-day{border-color:var(--s2) !important}
.wday-dot.s3-day{border-color:var(--s3) !important}
.wday-dot.s4-day{border-color:var(--s4) !important}
.wday-dot.s5-day{border-color:var(--s5) !important}

/* SESSION CARD */
.session-header{margin:20px 20px 0;padding:16px 20px;border-radius:16px;position:relative;overflow:hidden}
.session-header.s1{background:linear-gradient(135deg,#eef2ff,#dbeafe);border:1px solid #bfdbfe}
.session-header.s2{background:linear-gradient(135deg,#ecfeff,#cffafe);border:1px solid #a5f3fc}
.session-header.s3{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:1px solid #ddd6fe}
.session-header.s4{background:linear-gradient(135deg,#fdf2f8,#fce7f3);border:1px solid #fbcfe8}
.session-header.s5{background:linear-gradient(135deg,#f8fafc,#f1f5f9);border:1px solid #e2e8f0}
.session-header.rest{background:var(--surface);border:1px solid var(--border)}
.session-type{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px}
.session-type.s1{color:var(--s1)}
.session-type.s2{color:var(--s2)}
.session-type.s3{color:var(--s3)}
.session-type.s4{color:var(--s4)}
.session-type.s5{color:var(--s5)}
.session-sub{font-size:12px;color:var(--muted);margin-top:2px}
.session-series{font-family:'Bebas Neue',sans-serif;font-size:48px;position:absolute;right:20px;top:12px;opacity:0.08;letter-spacing:-2px;color:var(--text)}

/* WARMUP BANNER */
.warmup-banner{margin:12px 20px 0;padding:12px 16px;background:#fffbeb;border:1px solid #fde68a;border-radius:12px;font-size:12px;color:#92400e;font-weight:500;display:flex;align-items:center;gap:8px;cursor:pointer}
.warmup-banner.open{background:#fef3c7}

/* WARMUP DETAIL */
.warmup-detail{margin:0 20px;padding:12px 16px;background:#fffbeb;border:1px solid #fde68a;border-top:none;border-radius:0 0 12px 12px;display:none}
.warmup-detail.open{display:block}
.warmup-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #fde68a30;font-size:12px}
.warmup-row:last-child{border:none}
.warmup-row span:first-child{color:#78350f}
.warmup-row span:last-child{font-weight:600;color:#92400e}

/* EXERCISES */
.exercises{display:flex;flex-direction:column;gap:8px;padding:12px 20px 0}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s}
.ex-card:active{transform:scale(0.98)}
.ex-card.logged{border-color:#bfdbfe;background:#f0f6ff}
.ex-main{display:flex;align-items:center;gap:12px;padding:14px 16px}
.ex-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ex-icon.s1{background:#dbeafe}
.ex-icon.s2{background:#cffafe}
.ex-icon.s3{background:#ede9fe}
.ex-icon.s4{background:#fce7f3}
.ex-icon.s5{background:#f1f5f9}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:600;color:var(--text)}
.ex-sets{font-size:11px;color:var(--muted);margin-top:2px}
.ex-last{text-align:right;flex-shrink:0}
.ex-last-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.ex-last-val.s1{color:var(--s1)}
.ex-last-val.s2{color:var(--s2)}
.ex-last-val.s3{color:var(--s3)}
.ex-last-val.s4{color:var(--s4)}
.ex-last-val.s5{color:var(--s5)}
.ex-last-val.none{color:var(--muted);font-size:16px}
.ex-last-lbl{font-size:9px;color:var(--muted);text-align:right}
.ex-logged-bar{height:3px;background:linear-gradient(90deg,#bfdbfe,#1a4fd6)}

/* CIRCUIT (Séance 4) */
.circuit-wrap{padding:12px 20px 0}
.circuit-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.circuit-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.circuit-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--s4)}
.circuit-badge{font-size:11px;font-weight:600;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:20px}
.circuit-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)}
.circuit-row:last-of-type{border-bottom:none}
.circuit-ex{font-size:13px;font-weight:500;color:var(--text)}
.circuit-rep{font-size:12px;font-weight:700;color:var(--s4);background:#fce7f3;padding:3px 8px;border-radius:8px}
.circuit-counter{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.circuit-counter-lbl{font-size:12px;color:var(--muted)}
.circuit-counter-ctrl{display:flex;align-items:center;gap:14px}
.circuit-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--s4);background:transparent;color:var(--s4);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;line-height:1}
.circuit-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--s4);min-width:28px;text-align:center}
.circuit-finish{width:calc(100% - 32px);margin:0 16px 14px;background:var(--s4);color:#fff;border:none;border-radius:12px;padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.04em}

/* LOG PANEL */
.log-panel{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.log-panel.open{display:block}
.log-row{display:flex;gap:8px;align-items:center;margin-top:12px}
.log-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:var(--text);text-align:center;-webkit-appearance:none}
.log-input:focus{outline:none;border-color:var(--accent)}
.log-input::placeholder{color:var(--muted);font-weight:400}
.log-unit{font-size:12px;color:var(--muted);flex-shrink:0}
.log-save{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.log-save:active{opacity:0.8}
.log-history{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.log-hist-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--surface2);border-radius:8px}
.log-hist-date{font-size:11px;color:var(--muted)}
.log-hist-val{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--text)}
.log-hist-note{font-size:10px;color:var(--muted);font-style:italic}

/* PERF TABS */
.perf-tabs{display:flex;gap:6px;padding:16px 0 0}
.perf-tab{flex:1;padding:10px 6px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;background:var(--surface);color:var(--muted)}
.perf-tab.active{background:var(--blue);color:#fff}

/* PERF PAGE */
.perf-page{display:none;padding:0 20px}
.perf-page.active{display:block}
.perf-filter{display:flex;gap:6px;padding:16px 0 0;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.perf-filter::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn.s1.active{background:var(--s1);border-color:var(--s1);color:#fff}
.filter-btn.s2.active{background:var(--s2);border-color:var(--s2);color:#fff}
.filter-btn.s3.active{background:var(--s3);border-color:var(--s3);color:#fff}
.filter-btn.s4.active{background:var(--s4);border-color:var(--s4);color:#fff}
.filter-btn.s5.active{background:var(--s5);border-color:var(--s5);color:#fff}
.filter-btn.all.active{background:var(--text);border-color:var(--text);color:#fff}
.perf-list{display:flex;flex-direction:column;gap:12px;padding-top:12px}
.perf-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.perf-card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px}
.perf-card-name{font-size:14px;font-weight:600;color:var(--text)}
.perf-card-max{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.perf-card-max.s1{color:var(--s1)}
.perf-card-max.s2{color:var(--s2)}
.perf-card-max.s3{color:var(--s3)}
.perf-card-max.s4{color:var(--s4)}
.perf-card-max.s5{color:var(--s5)}
.chart-wrap{padding:0 16px 14px;position:relative;height:70px}
canvas{width:100%;height:70px}
.perf-table{border-top:1px solid var(--border)}
.perf-table-row{display:flex;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--muted2);font-size:12px}
.perf-table-row:last-child{border-bottom:none}
.perf-table-row .date{color:var(--muted)}
.perf-table-row .val{font-weight:600;color:var(--text)}
.perf-table-row .note{color:var(--muted);font-style:italic;font-size:11px}
.perf-empty{padding:16px;font-size:12px;color:var(--muted);text-align:center}

/* COURSES PAGE */
.courses-page{display:none;padding:0 20px}
.courses-page.active{display:block}
.run-form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:16px}
.run-form-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text);margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted)}
.form-input{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:var(--text);width:100%;-webkit-appearance:none}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-input::placeholder{color:var(--muted);font-weight:400}
.form-select{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text);width:100%;-webkit-appearance:none;cursor:pointer}
.save-run-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;letter-spacing:0.04em}
.save-run-btn:active{opacity:0.8}

/* VMA CARD */
.vma-card{background:linear-gradient(135deg,var(--s1),var(--blue2));border-radius:16px;padding:16px;margin-top:12px;color:#fff;position:relative;overflow:hidden}
.vma-card::before{content:'';position:absolute;top:-30px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07)}
.vma-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;opacity:.65;margin-bottom:6px}
.vma-big{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:2px;line-height:1}
.vma-sub{font-size:12px;opacity:.7;margin-top:4px}
.vma-zones{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px}
.vma-zone{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 10px;border:1px solid rgba(255,255,255,.15)}
.vma-zone-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;opacity:.65;margin-bottom:3px}
.vma-zone-val{font-size:13px;font-weight:700}

/* RUN LIST */
.run-list{display:flex;flex-direction:column;gap:8px;padding-top:12px}
.run-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.run-icon{width:40px;height:40px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.run-info{flex:1;min-width:0}
.run-date{font-size:11px;color:var(--muted);margin-bottom:2px}
.run-main{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
.run-sub{font-size:11px;color:var(--muted);margin-top:1px}
.run-vma{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--blue);background:var(--surface2);padding:4px 8px;border-radius:8px;white-space:nowrap}

/* RUN STATS */
.run-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.run-stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.run-stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--blue);line-height:1}
.run-stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 20px 20px;gap:6px;z-index:50}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:none;background:none;cursor:pointer;border-radius:10px;transition:all .2s}
.bnav-btn.active{background:var(--surface2)}
.bnav-icon{font-size:20px;line-height:1}
.bnav-lbl{font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--muted)}
.bnav-btn.active .bnav-lbl{color:var(--blue)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-radius:24px 24px 0 0;padding:24px 24px 40px;width:100%;max-height:80vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:4px;color:var(--text)}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.modal-field{margin-bottom:16px}
.modal-label{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.modal-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:18px;font-weight:600;color:var(--text);text-align:center;-webkit-appearance:none}
.modal-input:focus{outline:none;border-color:var(--accent)}
.modal-note{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);resize:none}
.modal-note:focus{outline:none;border-color:var(--accent)}
.modal-save{width:100%;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.modal-save:active{opacity:0.8}
.modal-cancel{width:100%;background:none;color:var(--muted);border:none;padding:12px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:4px}
.modal-prev{background:var(--surface);border-radius:12px;padding:12px 14px;margin-bottom:16px}
.modal-prev-title{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.modal-prev-list{display:flex;flex-direction:column;gap:5px;max-height:120px;overflow-y:auto}
.modal-prev-row{display:flex;justify-content:space-between;font-size:12px}
.modal-prev-date{color:var(--muted)}
.modal-prev-val{font-weight:600;color:var(--text)}

/* UTILS */
.page{display:none}.page.active{display:block}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--muted);padding:16px 20px 0}
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">TRAIN<span>ING</span></div>
  <div class="header-date" id="header-date"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bnav-btn active" onclick="showPage('today')" id="bnav-today">
    <div class="bnav-icon">🏋️</div>
    <div class="bnav-lbl">Séance</div>
  </button>
  <button class="bnav-btn" onclick="showPage('perf')" id="bnav-perf">
    <div class="bnav-icon">📊</div>
    <div class="bnav-lbl">Perfs</div>
  </button>
  <button class="bnav-btn" onclick="showPage('courses')" id="bnav-courses">
    <div class="bnav-icon">🏃</div>
    <div class="bnav-lbl">Courses</div>
  </button>
</div>

<!-- PAGE TODAY -->
<div class="page active" id="page-today">
  <div class="week-strip" id="week-strip"></div>
  <!-- CHRONO -->
  <div class="chrono-bar">
    <div class="chrono-display" id="chrono-display">00:00</div>
    <div class="chrono-controls">
      <button class="chrono-btn chrono-start" id="chrono-start-btn" onclick="chronoToggle()">▶ Lancer</button>
      <button class="chrono-btn chrono-reset" onclick="chronoReset()">↺ Reset</button>
    </div>
  </div>
  <div id="session-content"></div>
</div>

<!-- PAGE PERF -->

<script>
// ============================================================
// PROGRAMME CHLOÉ
// ============================================================
const PROGRAM = [
  {
    id:'s1', name:'BAS DU CORPS', sub:'Fessiers · Cuisses', color:'s1', series:5,
    exercises:[
      {id:'squat_h',    name:'Squat avec haltères',                    sets:'3×12',     icon:'🦵'},

    ]
  },
  {

      {id:'rowing_h',   name:'Rowing haltères',                        sets:'3×12',     icon:'🚣'},
      {id:'dev_ep',     name:'Développé épaules haltères',             sets:'3×10',     icon:'🔺'},
      {id:'curl_h',     name:'Curl biceps haltères',                   sets:'3×12',     icon:'💪'},
      {id:'ext_tric_h', name:'Extension triceps au-dessus tête',       sets:'3×12',     icon:'📏'},
      {id:'planche',    name:'Gainage planche',                        sets:'3×30s',    icon:'🧱',isTime:true},

  },
  {
    id:'s3', name:'BAS + VENTRE', sub:'Obliques · Gainage', color:'s3', series:5,
    exercises:[
      {id:'goblet',     name:'Goblet squat (haltères)',                sets:'3×12',     icon:'🦵'},
      {id:'hip_thrust2',name:'Hip thrust haltères',                    sets:'3×12',     icon:'🍑'},
      {id:'stepup',     name:'Step-up sur chaise',                     sets:'3×10/jambe',icon:'🪑'},
      {id:'russian',    name:'Russian twist avec poids',               sets:'3×20',     icon:'🌀'},
      {id:'planche_lat',name:'Planche latérale',                       sets:'3×20s/côté',icon:'↕️',isTime:true},

    ]

];

// Séance 4 (Full Body circuit) traitée à part
const S4 = {
  id:'s4', name:'FULL BODY', sub:'Brûle-calories · Circuit × 3', color:'s4',
  exercises:[
    {name:'Squat + développé haltères', reps:'12'},
    {name:'Rowing kettlebell',           reps:'12'},
    {name:'Fentes alternées',            reps:'12'},
    {name:'Mountain climbers',           reps:'30s'},
    {name:'Crunch',                      reps:'15'},
  ]
};

// Plan semaine : L=S1(bas), Ma=repos, Me=S2(haut), J=repos, V=S3(bas+ventre), S=course, D=course
function getProgramForDow(dow){
  const map={1:0,3:1,5:2};
  const v=map[dow];
  return v!==undefined ? PROGRAM[v] : null;
}
function getDayType(dow){
  if(dow===1||dow===3||dow===5) return 'muscu';
  if(dow===0) return 'course';
  return 'repos';
}

const STORAGE_KEY='workout-tracker-chloe-v1';
let appData={};

function load(){
  try{
    const r=localStorage.getItem(STORAGE_KEY);
    if(r) appData=JSON.parse(r);
    else{appData={history:{},sessions:{}};save();}
  }catch(e){appData={history:{},sessions:{}};}
}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(appData));}catch(e){}}

// ============================================================
// HELPERS
// ============================================================
const DAYS_FR=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const DAYS_FULL=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS_FR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

function dateKey(date){
  const d=new Date(date);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(date){
  const d=new Date(date);
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getFullYear()).slice(2);
}
function getLastVal(exId){
  const hist=appData.history[exId];
  if(!hist||!hist.length) return null;
  const wv=hist.filter(h=>h.v!==null&&h.v!==undefined);
  return wv.length?wv[wv.length-1].v:null;
}
function isLogged(exId,dateK){
  const hist=appData.history[exId];
  if(!hist) return false;
  return hist.some(h=>{
    const p=h.d.split('/');
    const hk='20'+p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
    return hk===dateK;
  });
}

// ============================================================
// STATE
// ============================================================
let currentView='today';
let viewDate=new Date();viewDate.setHours(0,0,0,0);
let modalExId=null;
let modalProgId=null;
let perfFilter='all';
let circuitCount=0;

// ============================================================
// HEADER
// ============================================================
function renderHeader(){
  const now=new Date();
  document.getElementById('header-date').innerHTML=
    DAYS_FULL[now.getDay()]+'<br>'+now.getDate()+' '+MONTHS_FR[now.getMonth()];
}

// ============================================================
// WEEK STRIP
// ============================================================
function renderWeekStrip(){
  const strip=document.getElementById('week-strip');
  const today=new Date();today.setHours(0,0,0,0);
  const mon=new Date(today);
  mon.setDate(today.getDate()-((today.getDay()+6)%7));
  strip.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const dow=d.getDay();
    const prog=getProgramForDow(dow);
    const dtype=getDayType(dow);
    const isToday=d.getTime()===today.getTime();
    const isView=d.getTime()===viewDate.getTime();
    const colorCls=prog?prog.color+'-day':dtype==='course'?'s4-day':'';
    const todayCls=isToday?'today':'';
    const hasCls=(prog||dtype==='course')?'has-session':'';
    const cell=document.createElement('div');
    cell.className='wday';
    cell.innerHTML=`<div class="wday-lbl">${DAYS_FR[dow]}</div>
      <div class="wday-dot ${hasCls} ${colorCls} ${todayCls}" style="${isView?'outline:2px solid var(--accent);outline-offset:2px':''}"> ${d.getDate()}</div>`;
    cell.onclick=()=>{viewDate=new Date(d);renderSession();renderWeekStrip();};
    strip.appendChild(cell);
  }
}

// ============================================================
// SESSION
// ============================================================
function renderSession(){
  const content=document.getElementById('session-content');
  const dow=viewDate.getDay();
  const prog=getProgramForDow(dow);
  const dk=dateKey(viewDate);

  if(!prog){
    const dtype=getDayType(dow);
    if(dtype==='course'){
      content.innerHTML=`<div class="empty">🏃‍♀️<br><br>Jour de course<br><span style="font-size:12px">Pense à enregistrer ta sortie !</span></div>`;
    } else {
      content.innerHTML=`<div class="empty">😴<br><br>Jour de repos<br><span style="font-size:12px">Récupération active</span></div>`;
    }
    return;
  }

  const p=PROGRAM.find(x=>x.id===prog.id)||prog;
  const optBadge=p.isOptional?` <span style="font-size:11px;font-weight:500;opacity:.7">(optionnelle)</span>`:'';

  let html=`<div class="session-header ${p.color}">
    <div class="session-type ${p.color}">${p.name}${optBadge}</div>
    <div class="session-sub">${p.sub}</div>
    <div class="session-series">${p.series}</div>
  </div>`;

  // Warmup
  html+=`<div class="warmup-banner" id="warmup-banner" onclick="toggleWarmup()">🔆 Échauffement 5 min — indispensable ▾</div>
  <div class="warmup-detail" id="warmup-detail">
    <div class="warmup-row"><span>Mobilité bassin</span><span>30 sec</span></div>
    <div class="warmup-row"><span>Squats poids du corps</span><span>15 reps</span></div>
    <div class="warmup-row"><span>Pont fessier au sol</span><span>15 reps</span></div>
    <div class="warmup-row"><span>Rotation buste</span><span>30 sec</span></div>
    <div class="warmup-row"><span>Montées de genoux lentes</span><span>1 min</span></div>
    <div class="warmup-row"><span>Gainage léger</span><span>30 sec</span></div>
  </div>`;

  html+=`<div class="exercises" id="ex-list">`;
  p.exercises.forEach(ex=>{
    const lastVal=ex.isTime?null:getLastVal(ex.id);
    const logged=isLogged(ex.id,dk);
    html+=`<div class="ex-card ${logged?'logged':''}" id="excard-${ex.id}" onclick="openModal('${ex.id}','${p.id}')">
      <div class="ex-main">
        <div class="ex-icon ${p.color}">${ex.icon}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-sets">${ex.sets}</div>
        </div>
        <div class="ex-last">
          ${ex.isTime
            ? `<div class="ex-last-val ${logged?p.color:'none'}">${logged?'✓':'—'}</div><div class="ex-last-lbl">${logged?'FAIT':'À FAIRE'}</div>`
            : lastVal!==null
              ? `<div class="ex-last-val ${p.color}">${lastVal}<span style="font-size:12px">kg</span></div><div class="ex-last-lbl">DERNIER</div>`
              : `<div class="ex-last-val none">—</div><div class="ex-last-lbl">AUCUN</div>`
          }
        </div>
      </div>
      ${logged?'<div class="ex-logged-bar"></div>':''}
    </div>`;
  });
  html+=`</div>`;
  content.innerHTML=html;
}

function toggleWarmup(){
  document.getElementById('warmup-banner').classList.toggle('open');
  document.getElementById('warmup-detail').classList.toggle('open');
}

function renderCircuitSession(content){
  circuitCount=0;
  let html=`<div class="session-header s4">
    <div class="session-type s4">${S4.name}</div>
    <div class="session-sub">${S4.sub}</div>
    <div class="session-series">3</div>
  </div>`;

  // Warmup
  html+=`<div class="warmup-banner" id="warmup-banner" onclick="toggleWarmup()">🔆 Échauffement 5 min — indispensable ▾</div>
  <div class="warmup-detail" id="warmup-detail">
    <div class="warmup-row"><span>Mobilité bassin</span><span>30 sec</span></div>
    <div class="warmup-row"><span>Squats poids du corps</span><span>15 reps</span></div>
    <div class="warmup-row"><span>Pont fessier au sol</span><span>15 reps</span></div>
    <div class="warmup-row"><span>Rotation buste</span><span>30 sec</span></div>
    <div class="warmup-row"><span>Montées de genoux lentes</span><span>1 min</span></div>
    <div class="warmup-row"><span>Gainage léger</span><span>30 sec</span></div>
  </div>`;

  html+=`<div class="circuit-wrap"><div class="circuit-card">
    <div class="circuit-header">
      <div class="circuit-title">CIRCUIT — 3 TOURS</div>
      <div class="circuit-badge">1 min repos entre tours</div>
    </div>`;
  S4.exercises.forEach(ex=>{
    html+=`<div class="circuit-row"><span class="circuit-ex">${ex.name}</span><span class="circuit-rep">${ex.reps}</span></div>`;
  });
  html+=`<div class="circuit-counter">
    <span class="circuit-counter-lbl">Tours complétés</span>
    <div class="circuit-counter-ctrl">
      <button class="circuit-btn" onclick="event.stopPropagation();changeCircuit(-1)">−</button>
      <div class="circuit-val" id="circuit-val">0</div>
      <button class="circuit-btn" onclick="event.stopPropagation();changeCircuit(1)">+</button>
    </div>
  </div>
  </div>
  <button class="circuit-finish" onclick="finishCircuit()">✅ SÉANCE TERMINÉE</button>
  </div>`;
  content.innerHTML=html;
}

function changeCircuit(d){
  circuitCount=Math.max(0,Math.min(3,circuitCount+d));
  const el=document.getElementById('circuit-val');
  if(el) el.textContent=circuitCount;
}

function finishCircuit(){
  const dk=dateKey(viewDate);
  if(!appData.sessions) appData.sessions={};
  appData.sessions[dk]='s4';
  save();
  renderSession();
}

// ============================================================
// MODAL
// ============================================================
function openModal(exId,progId){
  const prog=PROGRAM.find(p=>p.id===progId);
  if(!prog) return;
  const ex=prog.exercises.find(e=>e.id===exId);
  if(!ex) return;
  modalExId=exId;modalProgId=progId;
  document.getElementById('modal-title').textContent=ex.name.toUpperCase();
  document.getElementById('modal-sub').textContent=ex.sets;
  document.getElementById('modal-weight').value='';
  document.getElementById('modal-note').value='';
  const hist=appData.history[exId]||[];
  const prevEl=document.getElementById('modal-prev');
  const prevList=document.getElementById('modal-prev-list');
  if(hist.length){
    prevEl.style.display='block';
    prevList.innerHTML=[...hist].reverse().slice(0,8).map(h=>
      `<div class="modal-prev-row">
        <span class="modal-prev-date">${h.d}</span>
        <span class="modal-prev-val">${h.v!==null&&h.v!==undefined?h.v+'kg':'—'}${h.n?` <span style="font-size:10px;color:var(--muted);font-weight:400">${h.n}</span>`:''}</span>
      </div>`).join('');
  }else{prevEl.style.display='none';}
  const lastVal=getLastVal(exId);
  if(lastVal!==null) document.getElementById('modal-weight').value=lastVal;
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('modal-weight').focus(),300);
}

function closeModal(e){
  if(e.target===document.getElementById('modal-bg')) closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modal-bg').classList.remove('open');
  modalExId=null;
}

function saveLog(){
  if(!modalExId) return;
  const weight=document.getElementById('modal-weight').value;
  const note=document.getElementById('modal-note').value.trim();
  const val=weight!==''?parseFloat(weight):null;
  const dateStr=fmtDate(viewDate);
  if(!appData.history[modalExId]) appData.history[modalExId]=[];
  const existing=appData.history[modalExId].find(h=>h.d===dateStr);
  if(existing){
    existing.v=val;
    if(note) existing.n=note; else delete existing.n;
  } else {
    const entry={d:dateStr,v:val};
    if(note) entry.n=note;
    appData.history[modalExId].push(entry);
  }
  save();
  closeModalDirect();
  renderSession();
  if(currentView==='perf') renderPerf();
}

// ============================================================
// PERF PAGE
// ============================================================
function renderPerf(){
  const filterEl=document.getElementById('perf-filter');
  const cats=[
    {id:'all',label:'Tout',cls:'all'},
    {id:'s1',label:'Bas du corps',cls:'s1'},
    {id:'s2',label:'Haut du corps',cls:'s2'},
    {id:'s3',label:'Bas + Ventre',cls:'s3'},
    {id:'s5',label:'Abdos',cls:'s5'},
  ];
  filterEl.innerHTML=cats.map(c=>
    `<button class="filter-btn ${c.cls} ${perfFilter===c.id?'active':''}" onclick="setPerfFilter('${c.id}')">${c.label}</button>`
  ).join('');

  const list=document.getElementById('perf-list');
  list.innerHTML='';

  PROGRAM.forEach(prog=>{
    if(perfFilter!=='all'&&prog.id!==perfFilter) return;
    prog.exercises.filter(ex=>!ex.isTime).forEach(ex=>{
      const rawHist=(appData.history[ex.id]||[]).filter(h=>h.v!==null&&h.v!==undefined);
      if(!rawHist.length) return;
      const hist=[...rawHist].sort((a,b)=>{
        const p=s=>{const pts=s.split('/');return new Date('20'+pts[2],pts[1]-1,pts[0]);};
        return p(a.d)-p(b.d);
      });
      const maxVal=Math.max(...hist.map(h=>h.v));
      const card=document.createElement('div');
      card.className='perf-card';
      const canvasId='chart-'+ex.id;
      card.innerHTML=`
        <div class="perf-card-header">
          <div class="perf-card-name">${ex.name}</div>
          <div class="perf-card-max ${prog.color}">${maxVal}<span style="font-size:12px;font-weight:400">kg</span></div>
        </div>
        <div class="chart-wrap"><canvas id="${canvasId}" width="400" height="70"></canvas></div>
        <div class="perf-table">
          ${[...hist].reverse().map(h=>`
            <div class="perf-table-row">
              <span class="date">${h.d}</span>
              <span class="val">${h.v}kg</span>
              ${h.n?`<span class="note">${h.n}</span>`:''}
            </div>`).join('')}
        </div>`;
      list.appendChild(card);
      requestAnimationFrame(()=>drawChart(canvasId,hist,prog.color));
    });
  });

  if(!list.children.length){
    list.innerHTML='<div class="empty">Aucune donnée enregistrée encore</div>';
  }
}

let perfTab='muscu';

function switchPerfTab(tab){
  perfTab=tab;
  document.getElementById('ptab-muscu').classList.toggle('active',tab==='muscu');
  document.getElementById('ptab-course').classList.toggle('active',tab==='course');
  document.getElementById('perf-muscu-section').style.display=tab==='muscu'?'block':'none';
  document.getElementById('perf-course-section').style.display=tab==='course'?'block':'none';
  if(tab==='course') renderPerfCourse();
}

function renderPerfCourse(){
  const list=document.getElementById('perf-course-list');
  if(!runs.length){
    list.innerHTML='<div class="empty">🏃‍♀️<br><br>Aucune course enregistrée</div>';
    return;
  }

  const parseRunDate=d=>{const p=d.split('/');return new Date('20'+p[2],p[1]-1,p[0]);};
  const sorted=[...runs].sort((a,b)=>parseRunDate(a.date)-parseRunDate(b.date));

  // Stats totales
  const totalKm=runs.reduce((a,r)=>a+r.km,0);
  const bestVma=Math.max(...runs.map(r=>r.vma));
  const lastVma=sorted[sorted.length-1].vma;
  const firstVma=sorted[0].vma;
  const vmaProgress=Math.round((lastVma-firstVma)*10)/10;

  let html=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:12px">
      <div class="perf-card" style="text-align:center;padding:14px">
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px">Total km</div>
        <div class="perf-card-max s4" style="font-size:32px">${totalKm.toFixed(1)}<span style="font-size:14px;font-weight:400"> km</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${runs.length} sorties</div>
      </div>
      <div class="perf-card" style="text-align:center;padding:14px">
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px">Meilleure VMA</div>
        <div class="perf-card-max s1" style="font-size:32px">${bestVma}<span style="font-size:14px;font-weight:400"> km/h</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${vmaProgress>=0?'+':''}${vmaProgress} depuis le début</div>
      </div>
    </div>`;

  // Graphique VMA
  const vmaHist=sorted.map(r=>({d:r.date,v:r.vma}));
  const vmaCanvasId='chart-vma-perf';
  html+=`<div class="perf-card" style="margin-top:8px">
    <div class="perf-card-header">
      <div class="perf-card-name">Évolution VMA</div>
      <div class="perf-card-max s1">${lastVma}<span style="font-size:12px;font-weight:400"> km/h</span></div>
    </div>
    <div class="chart-wrap"><canvas id="${vmaCanvasId}" width="400" height="70"></canvas></div>
    <div class="perf-table">
      ${[...vmaHist].reverse().map(h=>`
        <div class="perf-table-row">
          <span class="date">${h.d}</span>
          <span class="val" style="color:var(--s1)">${h.v} km/h</span>
        </div>`).join('')}
    </div>
  </div>`;

  // Graphique km cumulés par sortie
  const kmHist=sorted.map(r=>({d:r.date,v:r.km}));
  const kmCanvasId='chart-km-perf';
  html+=`<div class="perf-card" style="margin-top:8px">
    <div class="perf-card-header">
      <div class="perf-card-name">Distance par sortie</div>
      <div class="perf-card-max s4">${Math.max(...runs.map(r=>r.km))}<span style="font-size:12px;font-weight:400"> km</span></div>
    </div>
    <div class="chart-wrap"><canvas id="${kmCanvasId}" width="400" height="70"></canvas></div>
    <div class="perf-table">
      ${[...kmHist].reverse().map(h=>`
        <div class="perf-table-row">
          <span class="date">${h.d}</span>
          <span class="val" style="color:var(--s4)">${h.v} km</span>
        </div>`).join('')}
    </div>
  </div>
  <div style="height:12px"></div>`;

  list.innerHTML=html;
  requestAnimationFrame(()=>{
    drawChart(vmaCanvasId,vmaHist,'s1');
    drawChart(kmCanvasId,kmHist,'s4');
  });
}

const COLOR_MAP={s1:'#1a4fd6',s2:'#0e7490',s3:'#7c3aed',s4:'#db2777',s5:'#64748b'};

function drawChart(canvasId,hist,colorKey){
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const w=canvas.offsetWidth;
  const h=70;
  canvas.width=w*dpr;canvas.height=h*dpr;
  ctx.scale(dpr,dpr);
  const vals=hist.map(h=>h.v);
  const min=Math.min(...vals)*0.9;
  const max=Math.max(...vals)*1.1;
  const color=COLOR_MAP[colorKey]||'#1a4fd6';
  const pad={l:8,r:8,t:8,b:8};
  const cw=w-pad.l-pad.r;const ch=h-pad.t-pad.b;
  const pts=vals.map((v,i)=>({
    x:pad.l+(i/Math.max(vals.length-1,1))*cw,
    y:pad.t+(1-(v-min)/(max-min||1))*ch
  }));
  // Area
  ctx.beginPath();
  ctx.moveTo(pts[0].x,h-pad.b);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,h-pad.b);
  ctx.closePath();
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,color+'30');
  grad.addColorStop(1,color+'00');
  ctx.fillStyle=grad;ctx.fill();
  // Line
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  // Dots
  pts.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle=color;ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
  });
}

// ============================================================
// COURSES + VMA
// ============================================================
const RUN_KEY='run-tracker-chloe-v1';
let runs=[];

function loadRuns(){try{runs=JSON.parse(localStorage.getItem(RUN_KEY)||'[]');}catch(e){runs=[];}}
function saveRuns(){try{localStorage.setItem(RUN_KEY,JSON.stringify(runs));}catch(e){}}

function saveRun(){
  const km=parseFloat(document.getElementById('run-km').value);
  const min=parseInt(document.getElementById('run-min').value)||0;
  const sec=parseInt(document.getElementById('run-sec').value)||0;
  const type=document.getElementById('run-type').value;
  const note=document.getElementById('run-note').value.trim();
  if(!km||km<=0){alert('Entre une distance valide');return;}
  if(min<=0&&sec<=0){alert('Entre une durée valide');return;}
  const totalMin=min+(sec/60);
  const pace=totalMin/km; // min/km
  const vKmh=(km/totalMin)*60;
  // VMA estimée : conservatrice, assume ~80% VMA sur un footing, 90% sur fractionné
  const factor=type==='Fractionné'?1.05:type==='Test VMA'?1.0:1.12;
  const vmaEst=Math.round(vKmh*factor*10)/10;
  const run={
    date:fmtDate(viewDate),
    km,min,sec,type,note,
    pace,vKmh:Math.round(vKmh*10)/10,
    vma:vmaEst
  };
  runs.push(run);
  saveRuns();
  // Clear
  ['run-km','run-min','run-sec','run-note'].forEach(id=>document.getElementById(id).value='');
  showVMAResult(run);
  renderRunList();
}

function showVMAResult(run){
  const pMin=Math.floor(run.pace);
  const pSec=Math.round((run.pace-pMin)*60);
  const vma=run.vma;
  const zones={
    recup:`${Math.round(vma*0.60*10)/10}–${Math.round(vma*0.70*10)/10} km/h`,
    aerobic:`${Math.round(vma*0.70*10)/10}–${Math.round(vma*0.80*10)/10} km/h`,
    seuil:`${Math.round(vma*0.80*10)/10}–${Math.round(vma*0.90*10)/10} km/h`,
    frac:`${Math.round(vma*0.95*10)/10}–${Math.round(vma*1.00*10)/10} km/h`,
  };
  document.getElementById('vma-result').innerHTML=`
    <div class="vma-card">
      <div class="vma-label">VMA estimée</div>
      <div class="vma-big">${vma} <span style="font-size:18px;font-weight:400;opacity:.7">km/h</span></div>
      <div class="vma-sub">Allure : ${pMin}:${String(pSec).padStart(2,'0')} min/km · ${run.km}km en ${run.min}min${run.sec>0?run.sec+'s':''}</div>
      <div class="vma-zones">
        <div class="vma-zone"><div class="vma-zone-lbl">🟦 Récupération</div><div class="vma-zone-val">${zones.recup}</div></div>
        <div class="vma-zone"><div class="vma-zone-lbl">🟩 Aérobie</div><div class="vma-zone-val">${zones.aerobic}</div></div>
        <div class="vma-zone"><div class="vma-zone-lbl">🟨 Seuil</div><div class="vma-zone-val">${zones.seuil}</div></div>
        <div class="vma-zone"><div class="vma-zone-lbl">🟥 Fractionné</div><div class="vma-zone-val">${zones.frac}</div></div>
      </div>
    </div>`;
}

function renderRunList(){
  const list=document.getElementById('run-list');
  const statsGrid=document.getElementById('run-stats-grid');
  if(!runs.length){
    list.innerHTML='<div class="empty">🏃‍♀️<br><br>Aucune course enregistrée</div>';
    statsGrid.style.display='none';
    return;
  }
  statsGrid.style.display='grid';
  // Stats mois courant
  const now=new Date();const m=now.getMonth();const y=now.getFullYear();
  const parseRunDate=d=>{const p=d.split('/');return new Date('20'+p[2],p[1]-1,p[0]);};
  const monthRuns=runs.filter(r=>{const d=parseRunDate(r.date);return d.getMonth()===m&&d.getFullYear()===y;});
  const totalKm=monthRuns.reduce((a,r)=>a+r.km,0);
  const avgPace=monthRuns.length?monthRuns.reduce((a,r)=>a+r.pace,0)/monthRuns.length:null;
  const bestVma=monthRuns.length?Math.max(...monthRuns.map(r=>r.vma)):null;
  document.getElementById('rs-km').textContent=totalKm.toFixed(1);
  document.getElementById('rs-sorties').textContent=monthRuns.length;
  if(avgPace){const pm=Math.floor(avgPace);const ps=Math.round((avgPace-pm)*60);document.getElementById('rs-allure').textContent=`${pm}:${String(ps).padStart(2,'0')}`;}
  if(bestVma) document.getElementById('rs-vma').textContent=bestVma;

  list.innerHTML=[...runs].reverse().map(r=>{
    const pm=Math.floor(r.pace);const ps=Math.round((r.pace-pm)*60);
    return `<div class="run-card">
      <div class="run-icon">🏃‍♀️</div>
      <div class="run-info">
        <div class="run-date">${r.date} · ${r.type}</div>
        <div class="run-main">${r.km} KM · ${r.min}MIN${r.sec>0?r.sec+'S':''}</div>
        <div class="run-sub">Allure ${pm}:${String(ps).padStart(2,'0')} min/km · ${r.vKmh} km/h${r.note?` · ${r.note}`:''}</div>
      </div>
      <div class="run-vma">~${r.vma}</div>
    </div>`;
  }).join('');
}

// CHRONO
// ============================================================
let chronoInterval=null;
let chronoRunning=false;
let chronoMs=0;

function chronoTick(){
  chronoMs+=10;
  const tot=Math.floor(chronoMs/1000);
  const min=Math.floor(tot/60);
  const sec=tot%60;
  const cs=Math.floor((chronoMs%1000)/10);
  document.getElementById('chrono-display').textContent=
    String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function chronoToggle(){
  const btn=document.getElementById('chrono-start-btn');
  const disp=document.getElementById('chrono-display');
  if(!chronoRunning){
    chronoRunning=true;
    chronoInterval=setInterval(chronoTick,10);
    btn.textContent='⏹ Arrêter';
    btn.classList.add('running');
    disp.classList.add('running');
  } else {
    chronoRunning=false;
    clearInterval(chronoInterval);
    btn.textContent='▶ Lancer';
    btn.classList.remove('running');
    disp.classList.remove('running');
  }
}

function chronoReset(){
  chronoRunning=false;
  clearInterval(chronoInterval);
  chronoMs=0;
  document.getElementById('chrono-display').textContent='00:00';
  document.getElementById('chrono-display').classList.remove('running');
  const btn=document.getElementById('chrono-start-btn');
  btn.textContent='▶ Lancer';
  btn.classList.remove('running');
}

  currentView=page;

  document.getElementById('bnav-'+page).classList.add('active');

}
